name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system libs (PortAudio for sounddevice)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq portaudio19-dev espeak-ng

      - name: Install dependencies
        run: uv sync --extra dev --extra tts --extra gguf --extra asr

      - name: Run tests
        run: uv run python -m pytest src/tests/ -v --tb=short
